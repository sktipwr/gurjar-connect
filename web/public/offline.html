<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Offline · Gurjar Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #fafafa; color: #111827; padding: 24px; text-align: center;
    }
    .card { max-width: 360px; }
    img { width: 88px; height: 88px; border-radius: 20px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { color: #6b7280; font-size: 15px; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #f97316; color: #fff; border: 0; border-radius: 12px;
      padding: 12px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:active { opacity: .9; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon-192.png" alt="Gurjar Connect" />
    <h1>You're offline</h1>
    <p>Gurjar Connect needs an internet connection to show the directory. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
